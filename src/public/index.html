<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Manga Reader</title>

  <link rel="manifest" href="/assets/manifest-D_gnROSa.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192-nKtL3mOr.png">
  <link rel="apple-touch-icon" href="/assets/icon-192-nKtL3mOr.png">

  <script type="module" crossorigin src="/assets/main-COZktOSx.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/api-BPljbFn_.js">
  <link rel="stylesheet" crossorigin href="/assets/api-DMx9eHV5.css">
  <link rel="stylesheet" crossorigin href="/assets/main-Bp6zZm3c.css">
</head>

<body>
  <div id="app">
    <!-- App will be mounted here -->
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading Manga Reader...</p>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[App] SW registered:', reg.scope))
          .catch(err => console.warn('[App] SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
